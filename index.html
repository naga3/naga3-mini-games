<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
    }
    h1 { margin: 40px 0 12px; font-size: 28px; }
    p.sub { color: #888; margin-bottom: 32px; font-size: 14px; }
    .games {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; width: 100%; max-width: 800px; padding: 0 16px 40px;
    }
    .game-card {
      background: #16213e; border-radius: 12px; padding: 24px;
      text-decoration: none; color: #eee; transition: transform 0.15s, background 0.15s;
    }
    .game-card:hover { background: #0f3460; transform: translateY(-2px); }
    .game-card h2 { font-size: 18px; margin-bottom: 8px; }
    .game-card p { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <h1>Mini Games</h1>
  <p class="sub">タップ / クリックで遊べるミニゲーム集</p>
  <div class="games">
    <a class="game-card" href="./src/games/walking-demo/">
      <h2>Walking Demo</h2>
      <p>タップした場所にキャラが歩いていくデモ</p>
    </a>
    <a class="game-card" href="./src/games/snake/">
      <h2>Snake</h2>
      <p>円運動するヘビ。タップで回転方向を切り替えてエサを食べよう</p>
    </a>
    <a class="game-card" href="./src/games/jump/">
      <h2>Jump</h2>
      <p>タップで方向転換！足場を乗り継いでどこまでも高く登ろう</p>
    </a>
    <a class="game-card" href="./src/games/daruma-jump/">
      <h2>Daruma Jump</h2>
      <p>長押しでパワーを溜めてジャンプ！穴を飛び越えてどこまでも進もう</p>
    </a>
    <a class="game-card" href="./src/games/hamster-racing/">
      <h2>Hamster Racing</h2>
      <p>押して左に曲がれ！だんだん速くなるコースを何周できるか</p>
    </a>
    <a class="game-card" href="./src/games/ninja-climbing/">
      <h2>Ninja Climbing</h2>
      <p>忍者を操ってジャンプと三角蹴りで上へ！トゲに注意して登れ</p>
    </a>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
